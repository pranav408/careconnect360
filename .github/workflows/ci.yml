name: CareConnect360 CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests and Package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Temurin Java 17 with Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build and test backend
        run: mvn -B clean verify

  frontend:
    name: Frontend Tests, Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node 22.22.0 with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker Configuration and Image Builds
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend, frontend]
    env:
      MYSQL_DATABASE: careconnect360
      MYSQL_USER: careconnect
      MYSQL_PASSWORD: ci_validation_password
      MYSQL_ROOT_PASSWORD: ci_root_validation_password
      MYSQL_HOST_PORT: 3307
      JWT_SECRET: ci-validation-jwt-secret-at-least-32-characters-long
      FRONTEND_HOST_PORT: 8088
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8088
      APP_ADMIN_BOOTSTRAP_ENABLED: "false"
      ADMIN_EMAIL: ""
      ADMIN_PASSWORD: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Validate Compose configuration
        run: |
          docker compose --env-file /dev/null config --quiet
          docker compose --env-file /dev/null config --services

      - name: Build backend Docker image
        run: docker compose --env-file /dev/null build backend

      - name: Build frontend Docker image
        run: docker compose --env-file /dev/null build frontend