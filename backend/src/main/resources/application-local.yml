spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/careconnect360?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:careconnect_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}

  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}

springdoc:
  api-docs:
    enabled: ${APP_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${APP_DOCS_ENABLED:true}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  admin:
    bootstrap:
      enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:false}
